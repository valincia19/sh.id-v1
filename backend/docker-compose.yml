services:
  # PostgreSQL Database (tuned for 2GB/2-core server)
  postgres:
    image: postgres:16-alpine
    container_name: scripthub_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    command: >
      postgres -c shared_buffers=256MB -c effective_cache_size=512MB -c work_mem=2MB -c maintenance_work_mem=64MB -c max_connections=60 -c random_page_cost=1.1 -c effective_io_concurrency=200 -c synchronous_commit=off -c checkpoint_completion_target=0.9 -c max_wal_size=256MB -c wal_buffers=8MB
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - scripthub_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 450M

  # Redis Cache (128MB budget for 2GB server)
  redis:
    image: redis:7-alpine
    container_name: scripthub_redis
    restart: unless-stopped
    env_file:
      - .env
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - scripthub_network
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 150M

  # Redis GUI (dev only — saves 200MB RAM in production)
  redisinsight:
    image: redis/redisinsight:latest
    container_name: scripthub_redisinsight
    restart: unless-stopped
    ports:
      - "5540:5540"
    networks:
      - scripthub_network
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - dev

  # Backend API Service
  backend-scripthub:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: backend-scripthub
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${API_PORT:-4000}:4000"
    networks:
      - scripthub_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app # Sync entire project for dev
      - /app/node_modules # Don't overwrite container's node_modules
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    command: npm run dev

  # OpenAPI Microservice
  openapi-scripthub:
    build:
      context: ../openapi
      dockerfile: Dockerfile
    container_name: openapi-scripthub
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "4001:4001"
    networks:
      - scripthub_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../openapi:/app # Sync Open API project for dev
      - /app/node_modules
    command: npm run dev

  # Automated PostgreSQL Backups (daily at 3:00 AM UTC → upload to S3/CDN)
  pgbackup:
    build:
      context: ./scripts
      dockerfile: Dockerfile.backup
    container_name: scripthub_pgbackup
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - scripthub_network
    depends_on:
      postgres:
        condition: service_healthy

  # PgAdmin (Optional - for database management)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: scripthub_pgadmin
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    networks:
      - scripthub_network
    depends_on:
      - postgres
    profiles:
      - dev

networks:
  scripthub_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
